<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUT Food Queue - History</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="lang.js"></script>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <h1>SUT FOOD QUEUE</h1>
            <div class="header-icons" style="display: flex; align-items: center; gap: 15px;">
                <span id="headerUsername" style="color: white; font-size: 14px; font-weight: bold;"></span>
                <i class="fa-regular fa-user" style="cursor: pointer;" onclick="window.location.href='user.html'"></i>
                <i class="fa-solid fa-globe" style="cursor: pointer;" onclick="window.location.href='home.html'"></i>
            </div>
        </div>

        <div class="content-section">
            <div class="wrapper-box">
                
                <div class="page-title" data-lang="history_title" style="text-align: center; margin-bottom: 30px; margin-top: 10px;">ประวัติการจอง</div>

                <div id="historyContainer" style="display: flex; flex-direction: column; gap: 15px;">
                    <div style="text-align: center; padding: 30px 0;">
                        <i class="fa-solid fa-spinner fa-spin" style="font-size: 2rem; color: #ffcc00; margin-bottom: 10px;"></i>
                        <p style="color: #666;">กำลังดึงข้อมูลประวัติจากเซิร์ฟเวอร์...</p>
                    </div>
                </div>

                <div style="width: 100%; text-align: center; margin-top: 40px;">
                    <button class="btn-back" style="width: 120px;" onclick="window.location.href='main.html'" data-lang="btn_back">กลับ</button>
                </div>

            </div>
        </div>
    </div>

    <script>
        window.addEventListener('load', function() {
            let name = localStorage.getItem('savedUsername');
            if(name) document.getElementById('headerUsername').innerText = name;

            // สั่งโหลดประวัติจาก Java ทันทีที่เปิดหน้า
            fetchHistoryFromJava();
        });

        function fetchHistoryFromJava() {
            const container = document.getElementById('historyContainer');

            /* ========================================================================
               ฝากบอกเพื่อน Backend:
               เตรียม API GET /api/bookingHistory 
               ส่ง JSON Array กลับมาเป็น list ของประวัติการจอง
               ========================================================================
            */

            // จำลองการดึงข้อมูลจาก Java (ดีเลย์ 1 วินาที)
            setTimeout(() => {
                
                // ข้อมูลสมมติที่ได้จาก Database ของ Java
                const historyData = [
                    { date: '21 เม.ย. 2026', time: '12:30 น.', table: 5, duration: 30, status: 'completed' },
                    { date: '20 เม.ย. 2026', time: '18:15 น.', table: 2, duration: 15, status: 'cancelled' },
                    { date: '18 เม.ย. 2026', time: '11:00 น.', table: 8, duration: 10, status: 'completed' }
                ];

                container.innerHTML = ''; // เคลียร์หน้าจอโหลดดิ้งทิ้ง

                if (historyData.length === 0) {
                    container.innerHTML = '<p style="text-align: center; color: #888;">ยังไม่มีประวัติการจองโต๊ะ</p>';
                    return;
                }

                // วนลูปสร้างกล่องประวัติแต่ละอัน
                historyData.forEach(item => {
                    let statusColor = item.status === 'completed' ? '#2e7d32' : '#d32f2f';
                    let statusText = item.status === 'completed' ? 'ใช้งานเสร็จสิ้น' : 'ยกเลิกการจอง';
                    let icon = item.status === 'completed' ? 'fa-check-circle' : 'fa-xmark-circle';

                    let cardHTML = `
                        <div style="background-color: #fff; padding: 15px; border-radius: 10px; border-left: 5px solid ${statusColor}; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <h3 style="margin: 0 0 5px 0; font-size: 1.1rem; color: #333;">โต๊ะที่ ${item.table} <span style="font-size: 0.9rem; color: #666; font-weight: normal;">(${item.duration} นาที)</span></h3>
                                <p style="margin: 0; font-size: 0.9rem; color: #888;"><i class="fa-regular fa-calendar"></i> ${item.date} | ${item.time}</p>
                            </div>
                            <div style="text-align: right;">
                                <span style="color: ${statusColor}; font-size: 0.9rem; font-weight: bold;"><i class="fa-solid ${icon}"></i> ${statusText}</span>
                            </div>
                        </div>
                    `;
                    container.innerHTML += cardHTML;
                });

                /* โค้ดสำหรับเชื่อม Java จริง: */
                fetch('http://localhost:8080/api/bookingHistory')
                .then(response => response.json())
                .then(data => {
                    // เอาข้อมูล data มาวนลูปสร้างกล่องแบบข้างบน
                });
                

            }, 1000);
        }
    </script>
</body>
</html>
