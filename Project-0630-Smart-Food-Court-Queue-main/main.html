<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUT Food Queue - Main Menu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    
    <script src="lang.js"></script>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <h1>SUT FOOD QUEUE</h1>
            <div class="header-icons" style="display: flex; align-items: center; gap: 15px;">
                <span id="headerUsername" style="color: white; font-size: 14px; font-weight: bold;"></span>
                
                <i class="fa-regular fa-user" style="cursor: pointer;" onclick="window.location.href='user.html'"></i>
                <i class="fa-solid fa-globe" style="cursor: pointer;" onclick="window.location.href='home.html'"></i>
            </div>
        </div>

        <div class="content-section">
            <div class="wrapper-box">
                <div class="page-title" data-lang="title_main">จองโต๊ะ & สั่งอาหาร</div>

                <button class="big-action-btn btn-yellow-dark" onclick="localStorage.setItem('userAction', 'book'); window.location.href='canteen.html'" data-lang="btn_book">จองโต๊ะ</button>

                <button class="big-action-btn btn-yellow-light" onclick="localStorage.setItem('userAction', 'order'); window.location.href='canteen.html'" data-lang="btn_order">สั่งอาหาร</button>
                
                <button type="button" class="btn-back" onclick="window.location.href='index.html'" data-lang="btn_logout">ออกจากระบบ</button>
            </div>
        </div>
    </div>

    <script>
        window.addEventListener('load', function() {
            let name = localStorage.getItem('savedUsername');
            if(name) {
                document.getElementById('headerUsername').innerText = name;
            }
        });
    </script>

</body>
</html>
