<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUT Food Queue - เลือกโรงอาหาร</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div style="display:flex; align-items:center; gap:10px;">
                <i class="fa-solid fa-chevron-left" style="cursor:pointer; color:var(--primary);" onclick="window.location.href='main.html'"></i>
                <h1 data-lang="title_canteen">เลือกโรงอาหาร</h1>
            </div>
            <div class="header-icons">
                <span id="headerName" class="header-name"></span>
                <i class="fa-solid fa-globe" onclick="window.location.href='home.html'"></i>
            </div>
        </div>

        <div class="wrapper-box">
            <div id="canteenList">
                <div class="loading-spinner">
                    <i class="fa-solid fa-spinner fa-spin"></i>
                    <p data-lang="canteen_loading">กำลังโหลด...</p>
                </div>
            </div>

            <div class="text-center mt-20">
                <button class="btn-back" onclick="window.location.href='main.html'">
                    <i class="fa-solid fa-arrow-left"></i>
                    <span data-lang="btn_back">กลับ</span>
                </button>
            </div>
        </div>
    </div>

    <script src="lang.js"></script>
    <script src="api.js"></script>
    <script>
        let mode = 'book';

        window.addEventListener('DOMContentLoaded', async () => {
            const session = requireAuth();
            if (!session) return;
            document.getElementById('headerName').textContent = session.userName;

            const params = new URLSearchParams(window.location.search);
            mode = params.get('mode') || 'book';
            localStorage.setItem('canteenMode', mode);

            await loadCanteens();
        });

        async function loadCanteens() {
            const list = document.getElementById('canteenList');
            try {
                const canteens = await api.getCanteens();
                if (!canteens || canteens.length === 0) {
                    list.innerHTML = `<div class="empty-state"><i class="fa-solid fa-store-slash"></i><p data-lang="canteen_empty">ไม่พบข้อมูลโรงอาหาร</p></div>`;
                    applyLanguage();
                    return;
                }

                const lang = localStorage.getItem('userLang') || 'th';
                list.innerHTML = canteens.map(c => {
                    const hours = c.openingHours && c.openingHours.length > 0
                        ? c.openingHours.map(h => `${h.openTime} - ${h.closeTime}`).join(', ')
                        : '';
                    const tableText = lang === 'th'
                        ? `${c.tableCount || 0} โต๊ะ`
                        : `${c.tableCount || 0} tables`;
                    return `
                    <div class="info-card open" onclick="selectCanteen(${c.canteenId}, '${escHtml(c.canteenName)}')">
                        <div class="card-icon"><i class="fa-solid fa-store"></i></div>
                        <div class="card-info">
                            <h3>${escHtml(c.canteenName)}</h3>
                            <p><i class="fa-regular fa-clock"></i> ${escHtml(hours)}</p>
                            <p><i class="fa-solid fa-chair"></i> ${tableText}</p>
                        </div>
                        <i class="fa-solid fa-chevron-right card-arrow"></i>
                    </div>`;
                }).join('');
            } catch (err) {
                list.innerHTML = `<div class="empty-state"><i class="fa-solid fa-triangle-exclamation"></i><p>โหลดข้อมูลไม่สำเร็จ กรุณาลองใหม่</p></div>`;
            }
        }

        function selectCanteen(id, name) {
            localStorage.setItem('selectedCanteenId', id);
            localStorage.setItem('selectedCanteenName', name);
            if (mode === 'book') {
                window.location.href = 'booking.html';
            } else {
                window.location.href = 'store.html';
            }
        }

        function escHtml(str) {
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }
    </script>
</body>
</html>
