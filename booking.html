<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUT Food Queue - Booking Table</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="lang.js"></script>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <h1>SUT FOOD QUEUE</h1>
            <div class="header-icons" style="display: flex; align-items: center; gap: 15px;">
                <span id="headerUsername" style="color: white; font-size: 14px; font-weight: bold;"></span>
                <i class="fa-regular fa-user" style="cursor: pointer;" onclick="window.location.href='user.html'"></i>
                <i class="fa-solid fa-globe" style="cursor: pointer;" onclick="window.location.href='home.html'"></i>
            </div>
        </div>

        <div class="content-section">
            <div class="wrapper-box">
                
                <div class="page-title" data-lang="booking_title" style="text-align: center; margin-bottom: 20px; margin-top: 10px;">จองโต๊ะ</div>

                <div class="booking-duration-section" style="margin-bottom: 25px; padding: 15px; background-color: #fcfcfc; border-radius: 10px; border: 1px solid #eee; text-align: center;">
                    <label for="durationSelect" style="display: block; margin-bottom: 10px; font-weight: bold; color: #555;">
                        <i class="fa-solid fa-hourglass-start"></i> เลือกระยะเวลาการใช้งาน:
                    </label>
                    <select id="durationSelect" style="width: 100%; padding: 12px; border-radius: 8px; border: 2px solid #ffcc00; font-family: inherit; font-size: 16px; background-color: white; cursor: pointer;">
                        <option value="5">5 นาที (แวะรับอาหาร)</option>
                        <option value="10">10 นาที (ทานด่วน)</option>
                        <option value="15">15 นาที (ทานปกติ)</option>
                        <option value="30" selected>30 นาที (มาตรฐาน)</option>
                    </select>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; padding: 0 10px;">
                    <button class="big-action-btn btn-yellow-dark" style="margin-bottom: 0;" onclick="bookTable(this, 1)" data-lang="table_1">โต๊ะที่ 1</button>
                    <button class="big-action-btn btn-yellow-light" style="margin-bottom: 0;" onclick="bookTable(this, 2)" data-lang="table_2">โต๊ะที่ 2</button>
                    
                    <button class="big-action-btn btn-yellow-light" style="margin-bottom: 0;" onclick="bookTable(this, 3)" data-lang="table_3">โต๊ะที่ 3</button>
                    <button class="big-action-btn btn-yellow-dark" style="margin-bottom: 0;" onclick="bookTable(this, 4)" data-lang="table_4">โต๊ะที่ 4</button>
                    
                    <button class="big-action-btn btn-yellow-dark" style="margin-bottom: 0;" onclick="bookTable(this, 5)" data-lang="table_5">โต๊ะที่ 5</button>
                    <button class="big-action-btn btn-yellow-light" style="margin-bottom: 0;" onclick="bookTable(this, 6)" data-lang="table_6">โต๊ะที่ 6</button>
                    
                    <button class="big-action-btn btn-yellow-light" style="margin-bottom: 0;" onclick="bookTable(this, 7)" data-lang="table_7">โต๊ะที่ 7</button>
                    <button class="big-action-btn btn-yellow-dark" style="margin-bottom: 0;" onclick="bookTable(this, 8)" data-lang="table_8">โต๊ะที่ 8</button>
                    
                    <button class="big-action-btn btn-yellow-dark" style="margin-bottom: 0;" onclick="bookTable(this, 9)" data-lang="table_9">โต๊ะที่ 9</button>
                    <button class="big-action-btn btn-yellow-light" style="margin-bottom: 0;" onclick="bookTable(this, 10)" data-lang="table_10">โต๊ะที่ 10</button>
                </div>

                <div style="width: 100%; text-align: center; margin-top: 40px;">
                    <button class="btn-back" style="width: 120px;" onclick="window.location.href='main.html'" data-lang="btn_back">กลับ</button>
                </div>

            </div>
        </div>
    </div>

    <script>
        window.addEventListener('load', function() {
            let name = localStorage.getItem('savedUsername');
            if(name) document.getElementById('headerUsername').innerText = name;

            // 2. ตรวจจับ QR Code (ถ้าผู้ใช้สแกน QR Code URL จะมี ?table=X)
            const urlParams = new URLSearchParams(window.location.search);
            const tableFromQR = urlParams.get('table');
            
            if (tableFromQR) {
                // ถ้ามาจากการสแกนโต๊ะ ให้ส่งไปเช็คกับ Java ทันที
                console.log("ผู้ใช้สแกน QR Code โต๊ะที่: " + tableFromQR);
                checkTableStatusFromJava(tableFromQR);
            }
        });

        // ฟังก์ชันสำหรับ QR Code (ให้เพื่อนมาเขียน Fetch ยิงไปหา Java ตรงนี้)
        function checkTableStatusFromJava(tableId) {
            alert("ระบบกำลังตรวจสอบสถานะโต๊ะที่ " + tableId + " จากเซิร์ฟเวอร์...");
            // อนาคต: fetch('http://.../api/checkTable?id=' + tableId) ...
        }

        // ฟังก์ชันกดจองโต๊ะ
        function bookTable(btn, tableNum) {
            let currentLang = localStorage.getItem('userLang') || 'th';
            
            if (btn.getAttribute('data-booked') === 'true') {
                alert(currentLang === 'th' ? 'ขออภัยค่ะ โต๊ะนี้ถูกจองไปแล้ว' : 'Sorry, this table is already booked.');
                return;
            }

            // 3. ดึงเวลาที่เลือกว่าจะจองกี่นาที
            let selectedDuration = document.getElementById('durationSelect').value;

            // แจ้งเตือนจำลองการยิง API (เดี๋ยวเอาออกตอนต่อ Java จริง)
            console.log("เตรียมส่งข้อมูลไป Java -> โต๊ะ: " + tableNum + ", เวลา: " + selectedDuration + " นาที");
            
            /* ========================================================================
               ฝากบอกเพื่อน: ให้เอาโค้ดด้านล่างนี้ไปปรับใช้เพื่อยิง Request ไปหา Java
               ========================================================================
               fetch('http://localhost:8080/api/book', {
                   method: 'POST',
                   headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                   body: `tableId=${tableNum}&duration=${selectedDuration}`
               })
               .then(response => response.json())
               .then(data => {
                   if(data.status === 'success') {
                       // สั่งเปลี่ยนสีปุ่มตรงนี้
                   }
               });
            */

            // โชว์แจ้งเตือนว่าส่งข้อมูลแล้ว
            let msg = currentLang === 'th' 
                ? 'ระบบได้ส่งคำขอจองโต๊ะที่ ' + tableNum + ' เป็นเวลา ' + selectedDuration + ' นาทีแล้ว' 
                : 'Booking request for Table ' + tableNum + ' (' + selectedDuration + ' mins) sent.';
            alert(msg);

            // เปลี่ยนสีปุ่ม (จำลองไปก่อน อนาคตต้องย้ายโค้ดก้อนนี้ไปไว้ในวงเล็บของ fetch ข้างบน)
            btn.setAttribute('data-booked', 'true');
            btn.style.backgroundColor = '#d9d9d9';
            btn.style.color = '#888';
            btn.innerText = currentLang === 'th' ? 'จองแล้ว' : 'Booked';
            btn.removeAttribute('data-lang');
        }
    </script>
</body>
</html>
