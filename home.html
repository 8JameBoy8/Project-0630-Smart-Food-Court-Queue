<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUT Food Queue - Select Language</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        
        <div class="header">
            <h1>SUT FOOD QUEUE</h1>
            <i class="fa-solid fa-globe"></i>
        </div>

        <div class="wrapper-box" style="text-align: center;">
            <h2 class="page-title" style="margin-top: 10px; margin-bottom: 30px;" data-lang="lang_title">เลือกภาษา / Select Language</h2>

            <div style="display: flex; flex-direction: column; gap: 15px;">
                
                <button class="big-action-btn btn-yellow-dark" onclick="setLanguage('th')">
                    <i class="fa-solid fa-language" style="font-size: 1.5rem;"></i>
                    ภาษาไทย
                </button>

                <button class="big-action-btn btn-yellow-light" onclick="setLanguage('en')">
                    <i class="fa-solid fa-earth-americas" style="font-size: 1.5rem;"></i>
                    English
                </button>

            </div>

            <div style="margin-top: 40px;">
                <button class="btn-back" data-lang="btn_back" onclick="window.location.href='index.html'">
                    <i class="fa-solid fa-arrow-left"></i> กลับ (Back)
                </button>
            </div>
        </div>

    </div>

    <script src="lang.js"></script>

    <script>
        function setLanguage(lang) {
            localStorage.setItem('userLang', lang);
            // เมื่อเลือกเสร็จให้เด้งไปหน้า Login (index.html)
            window.location.href = 'index.html'; 
        }
    </script>
</body>
</html>
