<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUT Food Queue - Modern Orders</title>
    <!-- นำเข้าไอคอนจาก FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- นำเข้าฟอนต์ Kanit -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #FFB703; 
            --secondary: #FB8500;
            --dark: #2b2d42;
            --gray: #8d99ae;
            --light: #f8f9fa;
            --white: #ffffff;
            --danger: #ef233c;
        }

        body {
            background-color: #edf2f4;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            font-family: 'Kanit', sans-serif;
        }

        .app-container {
            background-color: var(--light);
            width: 100%;
            max-width: 400px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 30px rgba(0,0,0,0.08);
            position: relative;
        }

        /* แถบ Header สีเข้ม โค้งมนด้านล่าง */
        .header {
            background-color: var(--dark); 
            color: var(--white);
            padding: 25px 20px 50px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
        }
        .header h1 { margin: 0; font-size: 1.2rem; font-weight: 500; color: var(--primary); }
        
        .header-icons { display: flex; align-items: center; gap: 15px; position: relative;}
        .header-icons i.fa-address-card { font-size: 1.5rem; cursor: pointer; transition: 0.2s; }
        .header-icons i.fa-address-card:hover { color: var(--primary); }

        /* ปุ่มและ Dropdown ภาษา */
        .lang-btn { background: none; border: none; color: var(--white); font-size: 1.5rem; cursor: pointer; transition: 0.2s; padding: 0;}
        .lang-btn:hover { color: var(--primary); }
        .lang-dropdown {
            position: absolute; top: 35px; right: 0; background: var(--white); border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15); display: none; flex-direction: column; overflow: hidden; width: 120px; z-index: 10;
        }
        .lang-dropdown.show { display: flex; } 
        .lang-option { padding: 12px; text-align: center; font-size: 0.95rem; color: var(--dark); cursor: pointer; border-bottom: 1px solid #f0f2f5; transition: 0.2s;}
        .lang-option:hover { background-color: #f0f2f5; color: var(--primary); }
        .lang-option:last-child { border-bottom: none; }

        /* การ์ดชื่อร้าน (ลอยทับ Header) */
        .store-header-card {
            background: var(--white);
            margin: -25px 20px 20px;
            padding: 15px 20px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 2;
        }
        .store-name { color: var(--dark); font-size: 1.1rem; font-weight: 600; }

        /* ------------------------------------- */
        /* ส่วนที่ 1: หน้ากระดิ่งแจ้งเตือน (โมเดิร์น) */
        /* ------------------------------------- */
        .bell-view {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding-bottom: 50px;
        }

        .bell-wrapper {
            width: 160px;
            height: 160px;
            background: linear-gradient(135deg, #ffffff, #e2e6ea);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1), inset 0 2px 5px rgba(255,255,255,0.8);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .bell-wrapper:hover { transform: scale(1.05); }

        .bell-icon { font-size: 5rem; color: var(--dark); }

        /* จุดแดงกระพริบ */
        .notification-dot {
            position: absolute;
            top: 25px;
            right: 25px;
            width: 22px;
            height: 22px;
            background-color: var(--danger);
            border-radius: 50%;
            border: 3px solid var(--white);
            animation: pulse-red 1.5s infinite;
        }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 35, 60, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(239, 35, 60, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 35, 60, 0); }
        }

        /* ------------------------------------- */
        /* ส่วนที่ 2: หน้ารายการออเดอร์ (โมเดิร์น) */
        /* ------------------------------------- */
        .orders-view {
            flex-grow: 1;
            display: none; 
            flex-direction: column;
            gap: 15px;
            padding: 0 20px 20px;
            overflow-y: auto;
        }

        /* การ์ดออเดอร์สีขาว มีเงา */
        .order-card {
            background-color: var(--white);
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
            transition: 0.2s;
            border-left: 5px solid var(--primary); /* แถบสีเหลืองด้านซ้ายเพิ่มความเก๋ */
        }
        .order-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.08); }

        /* กรอบรูปคนในออเดอร์ */
        .user-img-box {
            width: 50px;
            height: 50px;
            background: #f0f2f5;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .user-icon { font-size: 1.8rem; color: var(--gray); }
        
        .order-details { flex-grow: 1; }
        .user-name { font-size: 1.05rem; font-weight: 600; color: var(--dark); margin-bottom: 3px; }
        .food-items { font-size: 0.9rem; color: var(--gray); line-height: 1.4; }

        /* ปุ่ม Back ด้านล่าง */
        .bottom-section {
            padding: 20px;
            background: var(--white);
            border-top: 1px solid #eee;
            text-align: center;
            margin-top: auto;
        }
        .btn-back {
            background-color: #f0f2f5;
            color: var(--dark);
            border: none;
            padding: 12px 40px;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: 500;
            font-family: 'Kanit', sans-serif;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-back:hover { background-color: #e2e6ea; }

    </style>
</head>
<body>

    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <h1>SUT FOOD QUEUE</h1>
            <div class="header-icons">
                <i class="fa-regular fa-address-card" onclick="window.location.href='store_profile.html'"></i>
                
                <button class="lang-btn" onclick="toggleLangMenu()">
                    <i class="fa-solid fa-globe"></i>
                </button>
                
                <div class="lang-dropdown" id="langDropdown">
                    <div class="lang-option" onclick="changeLang('th')">🇹🇭 ภาษาไทย</div>
                    <div class="lang-option" onclick="changeLang('en')">🇬🇧 English</div>
                </div>
            </div>
        </div>

        <!-- การ์ดชื่อร้าน -->
        <div class="store-header-card">
            <span class="store-name" id="displayStoreName">ร้านค้า (Store)</span>
            <!-- เพิ่มไอคอนเล็กๆ ให้ดูมีอะไร -->
            <i class="fa-solid fa-shop" style="color: var(--primary); font-size: 1.2rem;"></i>
        </div>

        <!-- หน้า 1: กระดิ่งแจ้งเตือน -->
        <div class="bell-view" id="bellView">
            <!-- กรอบกระดิ่งกลมๆ -->
            <div class="bell-wrapper" onclick="openOrderList()">
                <i class="fa-solid fa-bell bell-icon"></i>
                <div class="notification-dot"></div>
            </div>
            <p style="color: var(--gray); margin-top: 20px; font-weight: 500;" id="alertText">มีออเดอร์ใหม่เข้ามากดเลย!</p>
        </div>

        <!-- หน้า 2: รายการออเดอร์ -->
        <div class="orders-view" id="ordersView">
            <!-- รายการจะถูกสร้างด้วย Javascript -->
        </div>

        <!-- ปุ่ม Back -->
        <div class="bottom-section">
            <button class="btn-back" id="backBtn" onclick="handleBack()">กลับ (Back)</button>
        </div>
    </div>

    <script>
        // --- 1. ระบบภาษา ---
        const translations = {
            th: { backBtn: "กลับ", alertText: "มีออเดอร์ใหม่เข้ามากดเลย!" },
            en: { backBtn: "Back", alertText: "New order! Tap here." }
        };

        let currentLang = localStorage.getItem('userLang') || 'th'; 

        window.addEventListener('DOMContentLoaded', () => {
            const savedName = localStorage.getItem('savedUsername');
            if (savedName) document.getElementById('displayStoreName').innerText = savedName;
            
            updateUIText();
            renderOrders(); 
        });

        function toggleLangMenu() {
            document.getElementById('langDropdown').classList.toggle('show');
        }

        function changeLang(lang) {
            currentLang = lang;
            localStorage.setItem('userLang', lang); 
            updateUIText();
            document.getElementById('langDropdown').classList.remove('show');
        }

        function updateUIText() {
            document.getElementById('backBtn').innerText = translations[currentLang].backBtn;
            document.getElementById('alertText').innerText = translations[currentLang].alertText;
        }

        window.onclick = function(event) {
            if (!event.target.matches('.fa-globe') && !event.target.matches('.lang-btn')) {
                let dropdown = document.getElementById("langDropdown");
                if (dropdown && dropdown.classList.contains('show')) dropdown.classList.remove('show');
            }
        }

        // --- 2. ระบบสลับหน้า กระดิ่ง -> รายการออเดอร์ ---
        function openOrderList() {
            document.getElementById('bellView').style.display = 'none';
            document.getElementById('ordersView').style.display = 'flex';
        }

        // --- 3. ระบบเรนเดอร์รายการออเดอร์ (ดีไซน์โมเดิร์น) ---
        function renderOrders() {
            const container = document.getElementById('ordersView');
            container.innerHTML = ""; // เคลียร์ก่อนสร้าง
            
            const incomingOrders = [
                { id: 1, customerName: "สมชาย รักเรียน", items: "ข้าวผัดกระเพราหมู 1, ข้าวผัดกระเพรากุ้ง 1" },
                { id: 2, customerName: "น้องฟ้า สายกิน", items: "ผัดกระเพราไก่ (ไม่ใส่ใบกระเพรา) 1" },
                { id: 3, customerName: "พี่บอย ท่าพระ", items: "ข้าวผัดกระเพราหมู 2" },
                { id: 4, customerName: "Student B63xxxxx", items: "ข้าวผัดกระเพราปลาหมึก พิเศษ 1" },
                { id: 5, customerName: "อาจารย์ สมศรี", items: "ข้าวผัดกระเพรากุ้ง 1" }
            ];

            incomingOrders.forEach(order => {
                container.innerHTML += `
                    <!-- 🚀 ตรงนี้แหละครับที่เปลี่ยนให้เด้งไปหน้า store_order_detail.html -->
                    <div class="order-card" onclick="window.location.href='store_order_detail.html'">
                        <div class="user-img-box">
                            <i class="fa-solid fa-user user-icon"></i>
                        </div>
                        <div class="order-details">
                            <div class="user-name">${order.customerName}</div>
                            <div class="food-items">${order.items}</div>
                        </div>
                    </div>
                `;
            });
        }

        // --- 4. ปุ่มกดย้อนกลับ ---
        function handleBack() {
            let bellView = document.getElementById('bellView');
            
            if (bellView.style.display === 'none') {
                document.getElementById('ordersView').style.display = 'none';
                bellView.style.display = 'flex';
            } else {
                window.location.href = 'store_main.html';
            }
        }
    </script>
</body>
</html>
