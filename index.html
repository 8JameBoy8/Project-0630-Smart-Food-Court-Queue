<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUT Food Queue - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container login-page">
        
        <div class="login-card wrapper-box">
            
            <div class="login-header header">
                <h1>SUT FOOD QUEUE</h1>
                <i class="fa-solid fa-globe" onclick="window.location.href='home.html'"></i>
            </div>

            <div class="login-content">
                <div class="profile-icon-container">
                    <i class="fa-solid fa-user-large" style="font-size: 3.5rem; color: #eee;"></i>
                </div>
                
                <h2 style="text-align: center; margin-bottom: 30px; color: #333;" data-lang="login_header">เข้าสู่ระบบ</h2>

                <form>
                    <div class="form-group">
                        <input type="text" id="usernameInput" placeholder="ชื่อผู้ใช้งาน" data-lang="user_label">
                        <i class="fa-solid fa-user"></i>
                    </div>
                    
                    <div class="form-group">
                        <input type="password" placeholder="รหัสผ่าน" data-lang="pass_label">
                        <i class="fa-solid fa-lock"></i>
                    </div>

                    <button type="button" class="btn-submit" data-lang="btn_submit" onclick="handleLogin()">
                        SUBMIT
                    </button>
                </form>
            </div>

        </div>

    </div>

    <script src="lang.js"></script>

    <script>
        function handleLogin() {
            // ดึงข้อความจากช่องกรอกชื่อ
            let username = document.getElementById('usernameInput').value;
            
            // ตรวจสอบว่าไม่ได้ปล่อยช่องว่างไว้
            if (username.trim() === "") {
                let currentLang = localStorage.getItem('userLang') || 'th';
                alert(currentLang === 'th' ? "กรุณากรอกชื่อผู้ใช้งานด้วยนะคะ" : "Please enter your username.");
                return; // หยุดการทำงาน ไม่ให้เปลี่ยนหน้า
            }

            // บันทึกชื่อลงในระบบของเบราว์เซอร์
            localStorage.setItem('savedUsername', username);

            // เปลี่ยนหน้าไปที่ main.html
            window.location.href = 'main.html';
        }
    </script>

</body>
</html>
