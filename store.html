<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUT Food Queue - Select Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    
</head>
<body>

    <div class="app-container">
        <div class="header">
            <h1 data-lang="store_title">ร้านอาหาร</h1>
            <i class="fa-solid fa-globe" style="cursor: pointer;" onclick="window.location.href='home.html'"></i>
        </div>

        <div class="wrapper-box">
            <div style="margin-bottom: 20px;">
                <button class="btn-back" onclick="history.back()">
                    <i class="fa-solid fa-arrow-left"></i> <span data-lang="btn_back">กลับ</span>
                </button>
            </div>

            <div class="canteen-cards-grid">
                
                <div class="canteen-card open" onclick="window.location.href='menu.html?store=A'" style="border-left: 5px solid #2e7d32;">
                    <div class="card-icon" style="background: #e8f5e9; color: #2e7d32;"><i class="fa-solid fa-store"></i></div>
                    <div class="card-info">
                        <h3 data-lang="store_a">ร้าน A</h3>
                        <p style="color: #2e7d32; font-weight: 500; font-size: 0.85rem; margin-top: 5px;">
                            <i class="fa-solid fa-door-open" style="color: #2e7d32;"></i> <span data-lang="status_open">เปิดให้บริการ</span>
                        </p>
                    </div>
                    <div class="card-arrow"><i class="fa-solid fa-chevron-right"></i></div>
                </div>

                <div class="canteen-card open" onclick="window.location.href='menu.html?store=B'" style="border-left: 5px solid #2e7d32;">
                    <div class="card-icon" style="background: #e8f5e9; color: #2e7d32;"><i class="fa-solid fa-store"></i></div>
                    <div class="card-info">
                        <h3 data-lang="store_b">ร้าน B</h3>
                        <p style="color: #2e7d32; font-weight: 500; font-size: 0.85rem; margin-top: 5px;">
                            <i class="fa-solid fa-door-open" style="color: #2e7d32;"></i> <span data-lang="status_open">เปิดให้บริการ</span>
                        </p>
                    </div>
                    <div class="card-arrow"><i class="fa-solid fa-chevron-right"></i></div>
                </div>

                <div class="canteen-card closed" style="opacity: 0.6; cursor: not-allowed; border-left: 5px solid #ff5252; transform: none; box-shadow: none;" onclick="alertClosed()">
                    <div class="card-icon" style="background: #ffebee; color: #ff5252;"><i class="fa-solid fa-store-slash"></i></div>
                    <div class="card-info">
                        <h3 data-lang="store_c" style="color: #888;">ร้าน C</h3>
                        <p style="color: #ff5252; font-weight: 500; font-size: 0.85rem; margin-top: 5px;">
                            <i class="fa-solid fa-door-closed" style="color: #ff5252;"></i> <span data-lang="status_closed">ปิดให้บริการ</span>
                        </p>
                    </div>
                </div>

                <div class="canteen-card closed" style="opacity: 0.6; cursor: not-allowed; border-left: 5px solid #ff5252; transform: none; box-shadow: none;" onclick="alertClosed()">
                    <div class="card-icon" style="background: #ffebee; color: #ff5252;"><i class="fa-solid fa-store-slash"></i></div>
                    <div class="card-info">
                        <h3 data-lang="store_d" style="color: #888;">ร้าน D</h3>
                        <p style="color: #ff5252; font-weight: 500; font-size: 0.85rem; margin-top: 5px;">
                            <i class="fa-solid fa-door-closed" style="color: #ff5252;"></i> <span data-lang="status_closed">ปิดให้บริการ</span>
                        </p>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        // ฟังก์ชันแจ้งเตือนเวลากดร้านที่ปิดอยู่
        function alertClosed() {
            let currentLang = localStorage.getItem('userLang') || 'th';
            let msg = currentLang === 'th' ? 'ขออภัยค่ะ ร้านนี้ปิดให้บริการแล้ว' : 'Sorry, this store is currently closed.';
            alert(msg);
        }
    </script>
    <script src="lang.js"></script>
</body>
</html>
