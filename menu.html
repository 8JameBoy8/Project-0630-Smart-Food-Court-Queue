<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUT Food Queue - Customize Order</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div style="display: flex; align-items: center; gap: 10px;">
                <i class="fa-solid fa-chevron-left" onclick="history.back()"></i>
                <h1 data-lang="order_summary">สรุปคำสั่งซื้อ</h1>
            </div>
        </div>

        <div class="wrapper-box">
            <div class="order-preview-card">
                <div class="preview-icon"><i class="fa-solid fa-plate-wheat"></i></div>
                <div class="preview-info">
                    <h2 data-lang="menu_krapao_moo">ข้าวผัดกระเพราหมู</h2>
                    <p class="base-price" data-lang="price_40">ราคา 40 บาท</p>
                </div>
            </div>

            <div class="option-section">
                <h3 data-lang="order_add">เพิ่มท็อปปิ้ง</h3>
                <div class="option-list">
                    <label class="option-item">
                        <input type="checkbox" name="topping" value="5" onchange="calculateTotal()">
                        <span data-lang="addon_egg">ไข่ดาว</span> (+5฿)
                    </label>
                    <label class="option-item">
                        <input type="checkbox" name="topping" value="7" onchange="calculateTotal()">
                        <span data-lang="addon_omelet">ไข่เจียว</span> (+7฿)
                    </label>
                </div>
            </div>

            <div class="option-section">
                <h3 data-lang="note_title">หมายเหตุ</h3>
                <textarea class="note-input" data-lang-placeholder="note_place" placeholder="เช่น ไม่เผ็ด, ไม่ใส่ผัก"></textarea>
            </div>

            <div class="total-bar">
                <div>
                    <span data-lang="total_text">ราคารวม</span>: 
                    <span id="totalPriceDisplay" style="font-weight: bold; color: var(--primary-dark);">40</span> ฿
                </div>
                <button class="btn-confirm" onclick="goToPayment()" data-lang="btn_buy">สั่งซื้อ</button>
            </div>
        </div>
    </div>

    <script src="lang.js"></script>
    <script>
        function calculateTotal() {
            let basePrice = 40; // ราคาตั้งต้น
            let checkboxes = document.querySelectorAll('input[name="topping"]:checked');
            let extra = 0;
            checkboxes.forEach(cb => extra += parseInt(cb.value));
            document.getElementById('totalPriceDisplay').innerText = basePrice + extra;
        }

        // เพิ่มฟังก์ชันนี้เข้ามาเพื่อจดราคาก่อนเปลี่ยนหน้า
        function goToPayment() {
            // ดึงตัวเลขราคาปัจจุบันจากหน้าจอ
            let finalPrice = document.getElementById('totalPriceDisplay').innerText;
            
            // บันทึกตัวเลขลงในเครื่องด้วยชื่อ 'finalPrice'
            localStorage.setItem('finalPrice', finalPrice);
            
            // สั่งให้เปลี่ยนหน้าไป payment.html
            window.location.href = 'payment.html';
        }
    </script>
</body>
</html>
