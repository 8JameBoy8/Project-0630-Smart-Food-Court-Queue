<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUT Food Queue - เลือกร้านอาหาร</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div style="display:flex; align-items:center; gap:10px;">
                <i class="fa-solid fa-chevron-left" style="cursor:pointer; color:var(--primary);" onclick="window.location.href='canteen.html?mode=order'"></i>
                <h1 data-lang="store_title">เลือกร้านอาหาร</h1>
            </div>
            <div class="header-icons">
                <span id="headerName" class="header-name"></span>
                <i class="fa-solid fa-globe" onclick="window.location.href='home.html'"></i>
            </div>
        </div>

        <div class="wrapper-box">
            <div id="canteenLabel" style="font-weight:600; color:#555; margin-bottom:16px; font-size:0.95rem;">
                <i class="fa-solid fa-store" style="color:var(--primary);"></i>
                <span id="canteenNameText"></span>
            </div>

            <div id="storeList">
                <div class="loading-spinner">
                    <i class="fa-solid fa-spinner fa-spin"></i>
                    <p>กำลังโหลดร้านอาหาร...</p>
                </div>
            </div>

            <div class="text-center mt-20">
                <button class="btn-back" onclick="window.location.href='canteen.html?mode=order'">
                    <i class="fa-solid fa-arrow-left"></i>
                    <span data-lang="btn_back">กลับ</span>
                </button>
            </div>
        </div>
    </div>

    <script src="lang.js"></script>
    <script src="api.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', async () => {
            const session = requireAuth();
            if (!session) return;

            const canteenId = localStorage.getItem('selectedCanteenId');
            const canteenName = localStorage.getItem('selectedCanteenName') || '';
            if (!canteenId) { window.location.href = 'canteen.html?mode=order'; return; }

            document.getElementById('headerName').textContent = session.userName;
            document.getElementById('canteenNameText').textContent = ' ' + canteenName;

            await loadStores(canteenId);
        });

        async function loadStores(canteenId) {
            const list = document.getElementById('storeList');
            const lang = localStorage.getItem('userLang') || 'th';
            try {
                const stores = await api.getCanteenStores(canteenId);
                if (!stores || stores.length === 0) {
                    list.innerHTML = `<div class="empty-state"><i class="fa-solid fa-store-slash"></i><p>ไม่มีร้านอาหารในโรงอาหารนี้</p></div>`;
                    return;
                }

                list.innerHTML = stores.map(s => {
                    const isOpen = s.isOpen;
                    const statusText = isOpen
                        ? (lang === 'th' ? 'เปิดให้บริการ' : 'Open')
                        : (lang === 'th' ? 'ปิดให้บริการ' : 'Closed');
                    const cardClass = isOpen ? 'info-card store-open' : 'info-card store-closed';
                    const iconClass = isOpen ? 'card-icon green' : 'card-icon red';
                    const statusClass = isOpen ? 'status-text open' : 'status-text closed';
                    const onclick = isOpen ? `selectStore(${s.storeId}, '${escHtml(s.storeName)}')` : '';

                    return `
                    <div class="${cardClass}" onclick="${onclick}">
                        <div class="${iconClass}">
                            <i class="fa-solid fa-utensils"></i>
                        </div>
                        <div class="card-info">
                            <h3>${escHtml(s.storeName)}</h3>
                            <p class="${statusClass}">
                                <i class="fa-solid fa-circle" style="font-size:0.6rem;"></i>
                                ${statusText}
                            </p>
                        </div>
                        ${isOpen ? '<i class="fa-solid fa-chevron-right card-arrow"></i>' : ''}
                    </div>`;
                }).join('');
            } catch (err) {
                list.innerHTML = `<div class="empty-state"><i class="fa-solid fa-triangle-exclamation"></i><p>โหลดข้อมูลไม่สำเร็จ</p></div>`;
            }
        }

        function selectStore(storeId, storeName) {
            localStorage.setItem('selectedStoreId', storeId);
            localStorage.setItem('selectedStoreName', storeName);
            window.location.href = 'menu.html';
        }

        function escHtml(str) {
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }
    </script>
</body>
</html>
