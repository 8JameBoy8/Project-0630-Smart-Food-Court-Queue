<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUT Food Queue - Order Summary</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="lang.js"></script>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div style="display: flex; align-items: center; gap: 10px;">
                <i class="fa-solid fa-chevron-left" onclick="history.back()" style="cursor: pointer;"></i>
                <h1 data-lang="order_summary">สรุปคำสั่งซื้อ</h1>
            </div>
            <div class="header-icons">
                <span id="headerUsername" style="color: white; font-size: 14px; font-weight: bold; margin-right: 10px;"></span>
                <i class="fa-solid fa-globe" style="cursor: pointer;" onclick="window.location.href='home.html'"></i>
            </div>
        </div>

        <div class="wrapper-box" style="padding: 15px; background: transparent; box-shadow: none;">
            
            <div class="shop-banner-simple">
                <i class="fa-solid fa-store"></i> <span data-lang="store_a">Store A</span>
            </div>

            <div class="order-card main-items">
                <div class="order-item-row-modern">
                    <div class="item-img-placeholder"><i class="fa-solid fa-bowl-food"></i></div>
                    <div class="item-info">
                        <h4 data-lang="menu_krapao_moo">ข้าวผัดกระเพราหมู</h4>
                        <p data-lang="price_40">ราคา 40 บาท</p>
                    </div>
                </div>
            </div>

            <div class="section-container">
                <h3 class="section-title-modern" data-lang="order_add">เพิ่มรายการ</h3>
                <div class="topping-grid-modern">
                    <div class="topping-card-modern" id="top1" onclick="toggleTopping('top1', 5)">
                        <i class="fa-solid fa-egg"></i>
                        <span data-lang="addon_egg">ไข่ดาว</span>
                        <small>+5฿</small>
                    </div>
                    <div class="topping-card-modern" id="top2" onclick="toggleTopping('top2', 7)">
                        <i class="fa-solid fa-stroopwafel"></i>
                        <span data-lang="addon_omelet">ไข่เจียว</span>
                        <small>+7฿</small>
                    </div>
                    <div class="topping-card-modern" id="top3" onclick="toggleTopping('top3', 5)">
                        <i class="fa-solid fa-bowl-rice"></i>
                        <span data-lang="addon_rice">ข้าวเปล่า</span>
                        <small>+5฿</small>
                    </div>
                </div>
            </div>

            <div class="section-container">
                <h3 class="section-title-modern" data-lang="note_title">หมายเหตุ</h3>
                <textarea class="note-input-modern" placeholder="เช่น ไม่เผ็ด, ไม่ใส่ผัก" data-lang-placeholder="note_place"></textarea>
            </div>

            <div class="bottom-sticky-bar">
                <div class="total-info">
                    <p data-lang="total_text">ราคารวม</p>
                    <h3>฿ <span id="displayTotal">40</span></h3> </div>
                <button class="btn-checkout-modern" onclick="goToPayment()" data-lang="btn_buy">สั่งซื้อ</button>
            </div>

        </div>
    </div>

    <script>
        window.addEventListener('load', function() {
            let name = localStorage.getItem('savedUsername');
            if(name) document.getElementById('headerUsername').innerText = name;
            applyLanguage();
        });

        let basePrice = 40; // ปรับเป็น 40 ให้ตรงกับรูป
        let currentTotal = basePrice;

        function toggleTopping(elementId, price) {
            let element = document.getElementById(elementId);
            if (element.classList.contains("topping-active")) {
                element.classList.remove("topping-active");
                currentTotal -= price;
            } else {
                element.classList.add("topping-active");
                currentTotal += price;
            }
            document.getElementById("displayTotal").innerText = currentTotal;
        }

        function goToPayment() {
            // บันทึกยอดเงินปัจจุบันลงเครื่อง (Key คือ finalPrice)
            localStorage.setItem('finalPrice', currentTotal);
            window.location.href = 'payment.html';
        }
    </script>
</body>
</html>
