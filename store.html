<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUT Food Queue - Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="lang.js"></script>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <h1>SUT FOOD QUEUE</h1>
            <div class="header-icons" style="display: flex; align-items: center; gap: 15px;">
                <span id="headerUsername" style="color: white; font-size: 14px; font-weight: bold;"></span>
                <i class="fa-regular fa-user" style="cursor: pointer;" onclick="window.location.href='user.html'"></i>
                <i class="fa-solid fa-globe" style="cursor: pointer;" onclick="window.location.href='home.html'"></i>
            </div>
        </div>

        <div class="content-section">
            <div class="wrapper-box">
                
                <div class="title-with-back" style="justify-content: center; position: relative;">
                    <i class="fa-solid fa-reply" style="position: absolute; left: 0; cursor: pointer;" onclick="window.location.href='canteen.html'"></i>
                    <span data-lang="store_title">Store</span>
                </div>

                <div class="store-list">
                    
                    <div class="store-card" onclick="window.location.href='menu.html'">
                        <div class="store-banner"></div>
                        <div class="store-info">
                            <span class="store-name" data-lang="store_a">ร้าน A</span>
                            <span class="status-open">Open</span>
                        </div>
                    </div>

                    <div class="store-card" onclick="window.location.href='menu.html'">
                        <div class="store-banner"></div>
                        <div class="store-info">
                            <span class="store-name" data-lang="store_b">ร้าน B</span>
                            <span class="status-open">Open</span>
                        </div>
                    </div>

                    <div class="store-card" onclick="alert('ขออภัยค่ะ ร้านนี้ปิดให้บริการแล้ว')">
                        <div class="store-banner"></div>
                        <div class="store-info">
                            <span class="store-name" data-lang="store_c">ร้าน C</span>
                            <span class="status-close">Close</span>
                        </div>
                    </div>

                    <div class="store-card" onclick="alert('ขออภัยค่ะ ร้านนี้ปิดให้บริการแล้ว')">
                        <div class="store-banner"></div>
                        <div class="store-info">
                            <span class="store-name" data-lang="store_d">ร้าน D</span>
                            <span class="status-close">Close</span>
                        </div>
                    </div>

                </div>

            </div>
        </div>
    </div>

    <script>
        window.addEventListener('load', function() {
            let name = localStorage.getItem('savedUsername');
            if(name) {
                document.getElementById('headerUsername').innerText = name;
            }
        });
    </script>

</body>
</html>
