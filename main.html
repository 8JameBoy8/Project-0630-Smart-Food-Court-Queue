<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUT Food Queue - Main Menu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        
        <div class="header">
            <h1 data-lang="title_main">จองโต๊ะ & สั่งอาหาร</h1>
            <div class="header-icons">
                <i class="fa-solid fa-circle-user" style="color: #ffcc00; cursor: pointer; font-size: 1.5rem;" onclick="window.location.href='user.html'"></i>
            </div>
        </div>

        <div class="wrapper-box">
            <div style="margin-bottom: 30px; text-align: center;">
                <p style="color: #888; font-size: 0.9rem;" data-lang="main_desc">SUT Smart Life</p>
                <h3 style="color: #333; font-weight: 500;" data-lang="main_subtitle">เลือกรายการที่คุณต้องการ</h3>
            </div>

            <div style="display: flex; flex-direction: column; gap: 20px;">
                
                <button class="big-action-btn btn-yellow-dark" onclick="window.location.href='canteen.html?mode=book'">
                    <i class="fa-solid fa-chair" style="font-size: 2.5rem; margin-bottom: 10px;"></i>
                    <span data-lang="btn_book">จองโต๊ะ</span>
                </button>

                <button class="big-action-btn btn-yellow-light" onclick="window.location.href='canteen.html?mode=order'">
                    <i class="fa-solid fa-utensils" style="font-size: 2.5rem; margin-bottom: 10px;"></i>
                    <span data-lang="btn_order">สั่งอาหาร</span>
                </button>

            </div>

            <div style="margin-top: 50px; text-align: center;">
                <button class="btn-back" style="color: #d32f2f; border-color: #ffcdd2;" data-lang="btn_logout" onclick="window.location.href='index.html'">
                    ออกจากระบบ
                </button>
            </div>
        </div>

    </div>

    <script src="lang.js"></script>
</body>
</html>
