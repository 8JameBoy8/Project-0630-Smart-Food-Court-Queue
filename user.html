<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUT Food Queue - User Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="lang.js"></script>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <h1>SUT FOOD QUEUE</h1>
            <div class="header-icons" style="display: flex; align-items: center; gap: 15px;">
                <i class="fa-solid fa-globe" style="cursor: pointer; color: #ffcc00;" onclick="window.location.href='home.html'"></i>
            </div>
        </div>

        <div class="content-section">
            <div class="wrapper-box" style="text-align: center;">
                
                <div class="page-title" data-lang="user_title" style="margin-bottom: 30px; margin-top: 10px;">ข้อมูลผู้ใช้งาน</div>

                <div id="userProfileContainer">
                    <div style="margin-bottom: 20px;">
                        <i class="fa-solid fa-circle-user" style="font-size: 6rem; color: #ddd;"></i>
                    </div>
                    
                    <div id="userData">
                        <i class="fa-solid fa-spinner fa-spin" style="color: #ffcc00;"></i>
                        <p>กำลังโหลดข้อมูล...</p>
                    </div>
                </div>

                <hr style="margin: 30px 0; border: none; border-top: 1px solid #eee;">

                <div style="display: flex; flex-direction: column; gap: 15px;">
                    <button class="btn-back" style="width: 100%; background-color: #f5f5f5; color: #333; border: 1px solid #ddd; padding: 12px; border-radius: 8px; cursor: pointer; font-family: inherit; font-weight: bold;" onclick="window.location.href='main.html'" data-lang="btn_back">กลับหน้าหลัก</button>
                    
                    <button class="btn-logout" style="width: 100%; background-color: #ffeeee; color: #d32f2f; border: 1px solid #ffcccc; padding: 12px; border-radius: 8px; cursor: pointer; font-family: inherit; font-weight: bold;" onclick="logout()">
                        <i class="fa-solid fa-right-from-bracket"></i> ออกจากระบบ
                    </button>
                </div>

            </div>
        </div>
    </div>

    <script>
        window.addEventListener('load', function() {
            displayUserProfile();
        });

        function displayUserProfile() {
            const userDataDiv = document.getElementById('userData');
            
            let loggedInUser = localStorage.getItem('savedUsername');
            
            if (!loggedInUser) {
                loggedInUser = "Guest User";
            }

            setTimeout(() => {
                userDataDiv.innerHTML = `
                    <h2 style="margin: 10px 0; color: #333;">${loggedInUser}</h2>
                    <p style="margin: 5px 0; color: #666; font-size: 1.1rem;">
                        <i class="fa-solid fa-id-card"></i> ID: B63xxxxx
                    </p>
                    <p style="margin: 5px 0; color: #888;">
                        <i class="fa-solid fa-graduation-cap"></i> Engineering
                    </p>
                `;
            }, 500);
        }

        function logout() {
            if(confirm("คุณต้องการออกจากระบบใช่หรือไม่?")) {
                localStorage.removeItem('savedUsername');
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
