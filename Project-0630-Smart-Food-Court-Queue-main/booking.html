<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUT Food Queue - Booking Table</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="lang.js"></script>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <h1>SUT FOOD QUEUE</h1>
            <div class="header-icons" style="display: flex; align-items: center; gap: 15px;">
                <i class="fa-regular fa-user" style="cursor: pointer;" onclick="window.location.href='user.html'"></i>
                <i class="fa-solid fa-globe" style="cursor: pointer;" onclick="window.location.href='home.html'"></i>
            </div>
        </div>

        <div class="content-section">
            <div class="wrapper-box">
                
                <div class="page-title" data-lang="booking_title" style="text-align: center; margin-bottom: 20px; margin-top: 10px;">จองโต๊ะ</div>

                <div id="timerContainer" style="display: none; background-color: #ff4d4d; color: white; padding: 10px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-weight: bold; width: 100%; box-sizing: border-box;">
                    <i class="fa-solid fa-clock"></i> 
                    <span data-lang="timer_text">เวลาที่เหลือในการจอง:</span> 
                    <span id="countdown">30:00</span>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; padding: 0 10px; box-sizing: border-box;">
                    <button class="big-action-btn btn-yellow-dark" style="margin-bottom: 0;" onclick="bookTable(this, 1)" data-lang="table_1">โต๊ะที่ 1</button>
                    <button class="big-action-btn btn-yellow-light" style="margin-bottom: 0;" onclick="bookTable(this, 2)" data-lang="table_2">โต๊ะที่ 2</button>
                    
                    <button class="big-action-btn btn-yellow-light" style="margin-bottom: 0;" onclick="bookTable(this, 3)" data-lang="table_3">โต๊ะที่ 3</button>
                    <button class="big-action-btn btn-yellow-dark" style="margin-bottom: 0;" onclick="bookTable(this, 4)" data-lang="table_4">โต๊ะที่ 4</button>
                    
                    <button class="big-action-btn btn-yellow-dark" style="margin-bottom: 0;" onclick="bookTable(this, 5)" data-lang="table_5">โต๊ะที่ 5</button>
                    <button class="big-action-btn btn-yellow-light" style="margin-bottom: 0;" onclick="bookTable(this, 6)" data-lang="table_6">โต๊ะที่ 6</button>
                    
                    <button class="big-action-btn btn-yellow-light" style="margin-bottom: 0;" onclick="bookTable(this, 7)" data-lang="table_7">โต๊ะที่ 7</button>
                    <button class="big-action-btn btn-yellow-dark" style="margin-bottom: 0;" onclick="bookTable(this, 8)" data-lang="table_8">โต๊ะที่ 8</button>
                    
                    <button class="big-action-btn btn-yellow-dark" style="margin-bottom: 0;" onclick="bookTable(this, 9)" data-lang="table_9">โต๊ะที่ 9</button>
                    <button class="big-action-btn btn-yellow-light" style="margin-bottom: 0;" onclick="bookTable(this, 10)" data-lang="table_10">โต๊ะที่ 10</button>
                </div>

                <div style="width: 100%; text-align: center; margin-top: 40px;">
                    <button class="btn-back" style="width: 120px;" onclick="window.location.href='main.html'" data-lang="btn_back">กลับ</button>
                </div>

            </div>
        </div>
    </div>

    <script>
        let countdownInterval;

        window.addEventListener('load', function() {
            checkExistingBooking();
        });

        function bookTable(btn, tableNum) {
            let currentLang = localStorage.getItem('userLang') || 'th';
            
            // 1. เช็คว่าผู้ใช้นี้ทำการจองไปแล้วหรือยัง (กัน 1 คนจองหลายโต๊ะ)
            let alreadyBooked = localStorage.getItem('bookedTableID');
            if (alreadyBooked) {
                alert(currentLang === 'th' ? 'คุณได้ทำการจองไปแล้ว (โต๊ะที่ ' + alreadyBooked + ') ไม่สามารถจองเพิ่มได้ค่ะ' : 'You have already booked Table ' + alreadyBooked + '. You cannot book another table.');
                return;
            }
            
            // 2. เช็คว่าปุ่มนั้นโดนคนอื่นจองไปหรือยัง (กันจองทับ)
            if (btn.getAttribute('data-booked') === 'true') {
                alert(currentLang === 'th' ? 'ขออภัยค่ะ โต๊ะนี้ถูกจองไปแล้ว' : 'Sorry, this table is already booked.');
                return;
            }

            // ตั้งเวลาหมดอายุ (ปัจจุบัน + 30 นาที)
            let expireTime = Date.now() + (30 * 60 * 1000); 
            localStorage.setItem('bookingExpireTime', expireTime);
            localStorage.setItem('bookedTableID', tableNum);

            alert(currentLang === 'th' ? 'จองโต๊ะที่ ' + tableNum + ' สำเร็จ! กรุณาไปที่โต๊ะภายใน 30 นาที' : 'Table ' + tableNum + ' booked! Please arrive within 30 mins.');

            checkExistingBooking();
        }

        function checkExistingBooking() {
            let expireTime = localStorage.getItem('bookingExpireTime');
            let bookedTableID = localStorage.getItem('bookedTableID');
            let currentLang = localStorage.getItem('userLang') || 'th';

            if (expireTime) {
                document.getElementById('timerContainer').style.display = 'block';
                
                if (countdownInterval) clearInterval(countdownInterval);
                
                countdownInterval = setInterval(function() {
                    let now = Date.now();
                    let timeLeft = expireTime - now;

                    if (timeLeft <= 0) {
                        clearInterval(countdownInterval);
                        localStorage.removeItem('bookingExpireTime');
                        localStorage.removeItem('bookedTableID');
                        document.getElementById('timerContainer').style.display = 'none';
                        
                        let timeoutMsg = currentLang === 'th' ? 'หมดเวลาการจองแล้ว โต๊ะของคุณถูกยกเลิก' : 'Booking time is up. Your table has been released.';
                        if(typeof translations !== 'undefined' && translations[currentLang] && translations[currentLang]['alert_timeout']) {
                            timeoutMsg = translations[currentLang]['alert_timeout'];
                        }
                        
                        alert(timeoutMsg);
                        location.reload(); 
                    } else {
                        let minutes = Math.floor(timeLeft / 60000);
                        let seconds = Math.floor((timeLeft % 60000) / 1000);
                        document.getElementById('countdown').innerText = 
                            minutes + ":" + (seconds < 10 ? '0' : '') + seconds;
                    }
                }, 1000);

                // เปลี่ยนปุ่มที่เราจองให้เป็นสีเทา
                let buttons = document.querySelectorAll('.big-action-btn');
                buttons.forEach(btn => {
                    // ใช้การเช็คเงื่อนไขที่รัดกุมขึ้น กันบัคโต๊ะ 1 สับสนกับโต๊ะ 10
                    let btnOnClick = btn.getAttribute('onclick');
                    if (btnOnClick && btnOnClick.includes('(this, ' + bookedTableID + ')')) {
                        btn.setAttribute('data-booked', 'true');
                        btn.style.backgroundColor = '#d9d9d9';
                        btn.style.color = '#888';
                        btn.innerText = currentLang === 'th' ? 'จองแล้ว' : 'Booked';
                        btn.removeAttribute('data-lang');
                    }
                });
            }
        }
    </script>
</body>
</html>
